<div class="tw-flex tw-flex-col tw-p-3">
  <ng-container *ngIf="filters && filters.length">
    <ng-container *ngIf="activeFilters.length">
      <div class="tw-flex tw-justify-between tw-items-center tw-mb-1">
        <h2>Applied Filters</h2>
        <p-button text="true"
                  (onClick)="clearAllFilters()"
                  label="Clear All">
        </p-button>
      </div>
      <div class="tw-flex tw-flex-col tw-border tw-border-color-gray-300 tw-rounded-md tw-mb-2 tw-pb-3">
        @for (filter of activeFilters; track filter.name) {
          @if (filter.selectedOptions.length > 0) {
            <div class="tw-max-w-full">
              <p-chip class="tw-mx-3 tw-mt-3 tw-max-w-full"
                      [removable]="true"
                      (onRemove)="removeFilter(filter)">
                <div class="tw-flex tw-flex-wrap">
                  {{filter.name + ':'}}&nbsp;
                  @for (option of filter.selectedOptions; track $index; let j = $index) {
                    <span>{{option.label}}<ng-container *ngIf="j < filter.selectedOptions.length-1">,&nbsp;</ng-container></span>
                  }
                </div>
              </p-chip>
            </div>
          }
        }
      </div>
    </ng-container>
    <p-panel *ngFor="let filter of filters"
             header="{{filter.name}}"
             styleClass="tw-mb-2"
             toggleable="true"
    >
      <p-listbox [options]="filter.options"
                 optionLabel="label"
                 [filter]="true"
                 [multiple]="true"
                 [checkbox]="true"
                 [showToggleAll]="false"
                 scrollHeight="500px"
                 [(ngModel)]="filter.selectedOptions"
                 (onChange)="onFilterChange()">
      </p-listbox>
    </p-panel>
  </ng-container>
</div>

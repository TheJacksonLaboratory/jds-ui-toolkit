<div class="tw-flex tw-flex-col tw-flex-1 tw-w-full tw-p-5 tw-gap-4">
  <div class="tw-text-sm tw-text-gray-600">
    Generic footer. Pass <code>logo</code>, <code>items</code> (PrimeNG MenuItem[]),
    and an optional <code>caption</code>. Defaults match the HPO Figma spec; override
    via CSS custom properties on the host element.
  </div>

  <lib-jds-footer
    [logo]="logo"
    [logoAlt]="logoAlt"
    [items]="items"
    [caption]="caption">
  </lib-jds-footer>
</div>

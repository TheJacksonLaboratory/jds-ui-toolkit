<div class="tw-flex tw-flex-col tw-flex-1 tw-h-full tw-w-full">
  <!-- docs overview section -->
  <div class="tw-w-full tw-flex-shrink-0 tw-py-2">
    <div *ngIf="currentComponent" class="tw-bg-white tw-rounded-2xl tw-shadow-lg tw-border tw-border-gray-100 tw-overflow-hidden">
      <!-- header section -->
      <div class="tw-bg-gradient-to-r tw-from-blue-600 tw-to-purple-600 tw-px-8 tw-py-2">
        <div class="tw-flex tw-items-center tw-justify-between">
          <h2 class="tw-text-2xl tw-font-medium tw-text-white tw-m-0">
            {{ currentComponent.name }}
          </h2>
          <div class="tw-flex tw-items-center tw-space-x-2">
            <span class="tw-inline-flex tw-items-center tw-px-3 tw-py-1 tw-rounded-full tw-text-xs tw-font-semibold tw-bg-yellow-400 tw-text-yellow-900">
              <div class="tw-w-2 tw-h-2 tw-bg-yellow-600 tw-rounded-full tw-mr-2 tw-animate-pulse"></div>
              <b>{{ currentComponent.status }}</b>
            </span>
          </div>
        </div>
      </div>
      <!-- end header section -->

      <!-- content section -->
      <div class="tw-p-8">
        <div class="tw-grid tw-grid-cols-1 md:tw-grid-cols-4 tw-gap-6">
          <!-- service overview -->
          <div class="md:tw-col-span-3 tw-bg-gray-50 tw-rounded-xl tw-p-6 tw-border-l-4 tw-border-blue-500">
            <div class="tw-flex tw-items-start tw-space-x-3">
              <div class="tw-flex-shrink-0">
                <svg class="tw-w-6 tw-h-6 tw-text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                </svg>
              </div>
              <div class="tw-flex-1">
                <h3 class="tw-text-lg tw-font-semibold tw-text-gray-900 tw-mb-2">Summary</h3>
                <p class="tw-text-gray-700 tw-leading-relaxed">
                  {{ currentComponent.description }}
                </p>
              </div>
            </div>
          </div>

          <!-- details section - auth and contact -->
          <div class="md:tw-col-span-1 tw-space-y-3">
            <!-- auth status -->
            <div class="tw-flex tw-items-center tw-justify-between tw-bg-green-50 tw-rounded-lg tw-p-3 tw-border tw-border-green-200">
              <div class="tw-flex tw-items-center tw-space-x-3">
                <div class="tw-w-8 tw-h-8 tw-bg-green-100 tw-rounded-full tw-flex tw-items-center tw-justify-center">
                  <svg class="tw-w-4 tw-h-4 tw-text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                  </svg>
                </div>
                <div class="tw-flex tw-items-center tw-space-x-2">
                  <p class="tw-text-sm tw-font-medium tw-text-gray-900">Authentication:</p>
                  <p class="tw-text-sm tw-text-gray-600">{{ currentComponent.isAuthRequired ? 'Auth required' : 'No auth required' }}</p>
                </div>
              </div>
            </div>

            <!-- contact info -->
            <div class="tw-bg-gray-50 tw-rounded-lg tw-p-3 tw-border tw-border-gray-200">
              <div class="tw-flex tw-items-center tw-space-x-3">
                <div class="tw-w-8 tw-h-8 tw-bg-gray-100 tw-rounded-full tw-flex tw-items-center tw-justify-center">
                  <svg class="tw-w-4 tw-h-4 tw-text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 4.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                  </svg>
                </div>
                <div class="tw-flex-1 tw-flex tw-items-center tw-space-x-2">
                  <p class="tw-text-sm tw-font-medium tw-text-gray-900">Contact:</p>
                  <p class="tw-text-sm tw-text-gray-600">{{ currentComponent.contact }}</p>
                </div>
              </div>
            </div>

            <!-- documentation -->
            <div class="tw-bg-blue-50 tw-rounded-lg tw-p-3 tw-border tw-border-blue-200">
              <div class="tw-flex tw-items-center tw-space-x-3">
                <div class="tw-w-8 tw-h-8 tw-bg-gray-100 tw-rounded-full tw-flex tw-items-center tw-justify-center">
                  <svg class="tw-w-4 tw-h-4 tw-text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                  </svg>
                </div>
                <div class="tw-flex-1 tw-flex tw-items-center tw-space-x-2">
                  <p class="tw-text-sm tw-font-medium tw-text-gray-900">Vignette:</p>
                  <a href="{{ currentComponent.docsUrl }}" target="_blank" class="tw-inline-flex tw-items-center tw-text-blue-600 hover:tw-text-blue-800 tw-transition-colors">
                    PDF download
                  </a>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <!-- end content section -->
    </div>
  </div>
  <!-- end docs overview section -->

  <div class="tw-flex-1 tw-relative">
    <router-outlet></router-outlet>
  </div>
</div>

<!-- tableContainer is used to provide a reference to the facet search component -->
<div class="async-tasks-container" #taskTableContainer>
  <div class="tw-flex-col tw-p-3 tw-bg-blue-50">
    <!-- header section -->
    <div class="tw-flex tw-justify-start tw-my-2">
      <!-- TODO: [GIK 6/4/2025]: change to be configurable -->
      <h3 class="tw-font-semibold tw-text-2xl">Async Tasks Hub</h3>
    </div>

    <div *ngIf="error" class="tw-flex tw-justify-start">
      <lib-widget-error [errorMessage]="error" class="tw-w-full"></lib-widget-error>
    </div>

    <!-- search and chips section -->
    <div class="tw-flex tw-my-2">
      <div class="tw-flex tw-w-1/3">
        <p-iconfield class="">
          <input type="text" placeholder="Search" class="tw-w-full" pInputText>
          <p-inputicon styleClass="pi pi-times" class="cursor-pointer"></p-inputicon>
        </p-iconfield>

        <p-button
          icon="pi pi-filter"
          *ngIf="tableConfig.allowFilters"
          [rounded]="true"
          [text]="true"
          [disabled]="!isFacetSearchEnabled()"
          (click)="onOpenFacetSearchPanel()"
          label="Facet Search"
          severity="info"
        ></p-button>
      </div>

      <div class="tw-flex">
        <!-- show chips section here -->
      </div>
    </div>

    <!-- table section -->
    <p-table
      #taskTable
      [value]="visibleTasks()"
      [paginatorPosition]="'top'"
      paginator="true"
      paginatorStyleClass="tw-bg-gray-100 tw-flex tw-border-x tw-border-t tw-border-gray-300 tw-justify-start"
      [showCurrentPageReport]="true"
      currentPageReportTemplate="Showing {first} to {last} of {totalRecords} Runs"
      [rows]="tableConfig.rowsPerPage"
      [first]="first"
      [rowsPerPageOptions]="tableConfig.rowsPerPageOptions"
      [expandedRowKeys]="expandedRows"
      [stripedRows]="tableConfig.isStriped"
      [globalFilterFields]="['name', 'description']"
      styleClass="async-task-table"
      dataKey="id"
      class="tw-text-sm"
      showGridlines
      [dt]="tableDt"
    >
      <ng-template #header>
        <tr>
          <th *ngIf="tableConfig.isExpandable" style="width: 3rem"></th>
          <th class="tw-font-semibold tw-w-1/12 tw-text-nowrap">Run Id</th>
          <th class="tw-font-semibold tw-w-1/6" pSortableColumn="name">
            Name <p-sortIcon field="name" />
          </th>
          <th class="tw-font-semibold tw-w-1/3" pSortableColumn="description">
            Description <p-sortIcon field="description" />
          </th>
          <th class="tw-font-semibold tw-w-1/6 tw-text-nowrap" pSortableColumn="initiated">
            Run Initiated <p-sortIcon field="initiated" />
          </th>
          <th class="tw-font-semibold tw-w-1/12" pSortableColumn="status">
            Status <p-sortIcon field="status" />
          </th>
          <th class="tw-font-semibold tw-w-1/6">Actions</th>
        </tr>
      </ng-template>
      <ng-template #body let-task let-i="rowIndex" let-expanded="expanded">
        <tr>
          <td *ngIf="tableConfig.isExpandable">
            <p-button
              [pRowToggler]="task"
              styleClass="p-button-text p-button-rounded p-button-plain"
              [icon]="expanded ? 'pi pi-chevron-down' : 'pi pi-chevron-right'">
            </p-button>
          </td>
          <td class="tw-w-1/12">{{ task.id }}</td>
          <td class="tw-w-1/6">{{ task.name }}</td>
          <td class="tw-w-1/3">{{ task.description }}</td>
          <td class="tw-w-1/6">{{ task.init_time }}</td>
          <td class="tw-w-1/12">
            <span
              class="tw-p-2 tw-rounded-full tw-text-center tw-w-20 tw-text-xs"
              [ngClass]="{
                'tw-text-purple-800 tw-bg-purple-100': task.status === WorkflowExecutionStatus.RUNNING,
                'tw-text-green-800 tw-bg-green-100': task.status === WorkflowExecutionStatus.COMPLETED,
                'tw-text-red-800 tw-bg-red-100': task.status === WorkflowExecutionStatus.FAILED,
                'tw-text-gray-800 tw-bg-gray-100': task.status === WorkflowExecutionStatus.CANCELED,
                'tw-text-orange-800 tw-bg-orange-100': task.status === WorkflowExecutionStatus.TERMINATED,
                'tw-text-yellow-800 tw-bg-yellow-100': task.status === WorkflowExecutionStatus.CONTINUED_AS_NEW,
                'tw-text-blue-800 tw-bg-blue-100': task.status === WorkflowExecutionStatus.TIMED_OUT
              }">
              {{ WorkflowExecutionStatus[task.status] }}
            </span>
          </td>
          <td>
            <div class="tw-flex tw-justify-end">
              <p-button *ngIf="task.status === WorkflowExecutionStatus.COMPLETED"
                        severity="info"
                        styleClass="tw-mx-2 tw-p-2"
                        (onClick)="openTask(task)"
                        title="Open Task"
                        variant="text">
                <i class="pi pi-external-link"></i>
                <span class="tw-hidden lg:tw-block">Open</span>
              </p-button>

              <p-button *ngIf="task.status !== WorkflowExecutionStatus.RUNNING"
                        severity="info"
                        styleClass="tw-mx-2 tw-p-2"
                        (onClick)="editTask(task)"
                        title="Edit Task"
                        variant="text">
                <i class="pi pi-pencil"></i>
                <span class="tw-hidden lg:tw-block">Edit</span>
              </p-button>
              @if(task.status === 1) {
                <p-button *ngIf="task.status === WorkflowExecutionStatus.RUNNING"
                          severity="contrast"
                          styleClass="tw-mx-2 tw-p-2"
                          (onClick)="cancelTask(task)"
                          title="Cancel Task"
                          variant="text">
                  <i class="pi pi-times-circle"></i>
                  <span class="tw-hidden lg:tw-block">Cancel</span>
                </p-button>
              } @else {
                <p-button *ngIf="task.status !== WorkflowExecutionStatus.RUNNING"
                          severity="danger"
                          styleClass="tw-mx-2 tw-p-2"
                          (onClick)="deleteTask(task)"
                          title="Delete Task"
                          variant="text" >
                  <i class="pi pi-trash"></i>
                  <span class="tw-hidden lg:tw-block">Delete</span>
                </p-button>
              }
            </div>
          </td>
        </tr>
      </ng-template>

      <!-- details section -->
      <ng-template #expandedrow let-task>
        <tr *ngIf="tableConfig.isExpandable">
          <td [attr.colspan]="tableConfig.isExpandable ? 7 : 6">
            <lib-asynctask-details
              [task]="task"
              [bodyTemplate]="tableConfig.detailsTemplate"
            ></lib-asynctask-details>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>

  <!-- facet search component -->
  <lib-facet-search
    *ngIf="isFacetSearchEnabled()"
    [categories]="searchCategories"
    [config]="searchConfig"
    [parentContainer]="taskTableContainer"
  ></lib-facet-search>
</div>

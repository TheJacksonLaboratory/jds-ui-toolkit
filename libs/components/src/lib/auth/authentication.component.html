@if ((auth.isAuthenticated$ | async) === false) {
  <p-button
    id="jds-login-btn"
    label="Login"
    severity="secondary"
    size="small"
    (click)="login()"
    />
}
@if (auth.isAuthenticated$ | async) {
  <p-button
    id="jds-logout-btn"
    label="Logout"
    severity="secondary"
    size="small"
    (click)="logout()"
    />
}

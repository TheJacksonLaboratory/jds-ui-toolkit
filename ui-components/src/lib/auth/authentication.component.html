<div class="tw-flex-col">
  <p-button
    *ngIf="(auth.isAuthenticated$ | async) === false"
    id="jds-login-btn"
    label="Login"
    styleClass="tw-bg-blue-500 tw-hover:bg-blue-700 tw-text-white tw-font-bold tw-py-2 tw-px-4 tw-rounded"
    icon="pi pi-sign-in"
    iconPos="left"
    (click)="login()"
  />

  <p-button
    *ngIf="auth.isAuthenticated$ | async"
    id="jds-logout-btn"
    label="Logout"
    styleClass="tw-bg-blue-500 tw-hover:bg-blue-700 tw-text-white tw-font-bold tw-py-2 tw-px-4 tw-rounded"
    icon="pi pi-user"
    iconPos="left"
    (click)="logout()"
  />
</div>

@if (blockUi()) {
  <p-blockUI [blocked]="blockUi()" >
    <div class="tw-flex tw-flex-col tw-justify-center tw-items-center tw-h-screen tw-w-screen tw-relative">
      <ng-container *ngTemplateOutlet="spinnerTemplate"></ng-container>
    </div>
  </p-blockUI>
} @else {
  <div class="tw-inline-block">
    <div class="tw-flex tw-flex-col tw-items-center tw-size-auto">
      <ng-container *ngTemplateOutlet="spinnerTemplate"></ng-container>
    </div>
  </div>
}

<ng-template #spinnerTemplate>
  <p-progress-spinner [style]="sizeObject()"></p-progress-spinner>
  <div class="tw-flex" [ngClass]="{'tw-flex-row-reverse': iconLeft()}">
    <span>{{ statusMessage() }}</span>
    @if (iconClass().length) {
      <i [class]="iconClass()" class="tw-mx-1"></i>
    }
  </div>
</ng-template>

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name:  jds-ui-demo-ingress
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
    - hosts:
        - "jds-apps-stage.jax.org"
      secretName: jds-apps-stage-jax-org-tls
  rules:
    - host: "jds-apps-stage.jax.org"
      http:
        paths:
          - pathType: Prefix
            path: "/"
            backend:
              service:
                name: jds-ui-demo
                port:
                  number: 80
          - pathType: Prefix
            path: "/echo"
            backend:
              service:
                name: jds-ui-demo
                port:
                  number: 80



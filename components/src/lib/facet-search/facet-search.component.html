<p-drawer
  [visible]="isSearchVisible()"
  [modal]="false"
  [position]="'right'"
  [blockScroll]="false"
  [closable]="true"
  [style]="{
      position: 'absolute',
      top: '0px',
      right: '0px',
      height: '100%',
      width: '350px'
    }"
  [appendTo]="containingElement"
>
  <ng-template #headless>
    <div class="tw-flex tw-flex-col tw-h-full">
      <!-- heading section and close button -->
      <div class="tw-flex tw-items-center tw-justify-between tw-px-2 tw-pt-4 tw-shrink-0">
        <span class="tw-inline-flex tw-items-center tw-gap-2">
          <h2 class="tw-text-2xl tw-font-semibold tw-text-black-500">Facet Search</h2>
        </span>
        <span *ngIf="config.isToggable">
          <p-button type="button" (click)="onCloseFacetSearch()" icon="pi pi-times" rounded="true" outlined="true" styleClass="tw-h-8 tw-w-8 tw-text-black-500"></p-button>
        </span>
      </div>

      <div class="tw-mx-2">
        <p-divider class="tw-flex tw-my-4 tw-text-black-500 tw-justify-self-center"></p-divider>
      </div>

      <!-- applied searches section -->
      <div class="tw-mx-2 tw-mb-4" *ngIf="appliedSearchesChips().length > 0">
        <div class="tw-bg-blue-50 tw-border tw-border-blue-200 tw-rounded-lg tw-p-4 tw-shadow-sm">
          <div class="tw-flex tw-items-center tw-gap-2 tw-mb-3">
            <i class="pi pi-filter tw-text-blue-600"></i>
            <span class="tw-font-semibold tw-text-blue-800 tw-text-sm tw-uppercase tw-tracking-wide">
              Applied Filters
            </span>
            <span class="tw-bg-blue-600 tw-text-white tw-text-xs tw-px-2 tw-py-1 tw-rounded-full">
              {{ appliedSearchesChips().length }}
            </span>
          </div>

          <div class="tw-flex tw-flex-wrap tw-gap-2">
            <p-chip
              *ngFor="let searchChip of appliedSearchesChips(); trackBy: trackByChipId"
              [label]="searchChip.label"
              [removable]="true"
              (onRemove)="onRemoveAppliedSearchChip(searchChip)"
              styleClass="applied-search-chip"
            ></p-chip>
          </div>
        </div>
      </div>

      <!-- categories section -->
      <div class="tw-overflow-y-auto tw-flex-1 tw-my-2 tw-mx-2">
        <div *ngFor="let category of categories(); let i = index" class="tw-mb-4 tw-bg-white tw-shadow-sm tw-overflow-hidden">
          <!-- category header section -->
          <div
            class="tw-p-4 tw-flex tw-items-center tw-justify-between tw-cursor-pointer tw-transition-colors tw-hover:bg-gray-50 tw-border-b tw-border-gray-100"
            [ngClass]="{ 'tw-bg-blue-50 tw-border-blue-200': category.isOpen, 'tw-bg-white': !category.isOpen }"
            (click)="onToggleCategory(category)"
            (keyup.enter)="onToggleCategory(category)"
            (keyup.space)="onToggleCategory(category)"
            [attr.tabindex]="0"
            [attr.role]="'button'"
            [attr.aria-expanded]="category.isOpen"
            [attr.aria-controls]="'category-options-' + i"
            [attr.aria-label]="'Toggle ' + (category.label || category.name) + ' category'"
          >
            <div class="tw-flex tw-items-center tw-gap-3">
              <i class="pi pi-folder tw-text-gray-500"
                 [ngClass]="{ 'pi-folder-open tw-text-blue-600': category.isOpen, 'pi-folder tw-text-gray-500': !category.isOpen}"
              ></i>
              <span class="tw-font-semibold tw-text-lg tw-text-black">
                {{ category.label || category.name }}
              </span>
              <span class="tw-bg-gray-100 tw-text-gray-600 tw-text-xs tw-px-2 tw-py-1 tw-rounded-full">
                {{ getVisibleOptionCount(category) }}
              </span>
            </div>
          </div>

          <!-- category options section -->
          <div *ngIf="category.isOpen" class="tw-py-3 tw-bg-gray-50">
            <div *ngFor="let option of getOptionsForCategory(category); trackBy: trackOptionById"
                 class="tw-flex tw-transition-colors tw-hover:bg-white"
                 [ngClass]="{
                   'tw-opacity-50 tw-cursor-not-allowed': option.count === 0,
                   'tw-cursor-pointer': option.count > 0
                 }"
            >
              <ng-container *ngIf="category.showZeroCount || option.count > 0">
                <div class="tw-flex tw-p-2 tw-items-center tw-gap-3 tw-flex-1">
                  <p-checkbox
                    [binary]="true"
                    [ngModel]="option.selected"
                    [inputId]="'checkbox-' + category.name + '-' + option.id"
                    [disabled]="option.count === 0"
                    (onChange)="onOptionChange(category, option, $event)"
                    styleClass="custom-checkbox"
                  ></p-checkbox>

                  <label
                    [for]="'checkbox-' + category.name + '-' + option.id"
                    class="tw-flex-1 tw-cursor-pointer tw-text-gray-700 tw-font-medium"
                    [ngClass]="{
                    'tw-text-gray-400 tw-cursor-not-allowed': option.count === 0,
                    'tw-text-gray-700': option.count > 0
                  }"
                  >
                    {{ option.label }}
                  </label>
                </div>

                <span class="tw-inline-flex tw-items-center tw-justify-center tw-rounded-full tw-text-xs tw-font-semibold tw-min-w-6 tw-h-6"
                      [ngClass]="{
                        'tw-bg-blue-100 tw-text-blue-800': option.count > 0 && option.selected,
                        'tw-bg-gray-100 tw-text-gray-600': option.count > 0 && !option.selected,
                        'tw-bg-gray-50 tw-text-gray-400': option.count === 0
                      }"
                >
                  {{ option.count }}
                </span>
              </ng-container>
            </div>
          </div>

          <!-- search box section - active when there are more than 5 options (visible and invisible) in the category -->
          <div *ngIf="category.options.length > 5" class="tw-mt-3 tw-pt-3">
            <div class="tw-relative">
              <i class="pi pi-search tw-absolute tw-left-3 tw-top-1/2 tw-transform tw--translate-y-1/2 tw-text-gray-400"></i>
              <input
                type="text"
                placeholder="Search options..."
                class="tw-w-full tw-pl-10 tw-pr-4 tw-py-2 tw-border tw-rounded-md tw-focus:outline-none tw-focus:ring-0 tw-focus:border-gray-300"
                (input)="onFilterOptions(category, $event)"
              >
            </div>
          </div>
        </div>
      </div>
    </div>
  </ng-template>
</p-drawer>

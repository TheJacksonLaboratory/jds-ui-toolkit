name: CI - APPS/LIBS
on: 
  workflow_dispatch:
jobs:
  main:
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.13.1
          run_install: false

      - name: Install dependencies with pnpm
        run: pnpm install --frozen-lockfile

      - name: Lint affected
        run: pnpm run lint
      - name: Test affected
        run: pnpm run test --configuration=ci
      - name: Build affected
        run: pnpm run build

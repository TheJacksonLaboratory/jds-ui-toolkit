<div class="tw-flex tw-flex-col tw-flex-1 tw-h-full tw-relative tw-py-5 tw-bg-blue-100">
  <!-- mock study metadata section -->
  <div class="tw-flex-shrink-0">
    <h3 class="tw-text-xl tw-font-semibold tw-p-4">Study Metadata Placohlder</h3>
  </div>

  <div class="tw-flex tw-flex-1 tw-py-5">
    <!-- mock facet search section -->
    <div class="tw-flex tw-w-1/4 async-tasks-container" #facetSearchContainer>
      <!-- facet search component -->
      <lib-facet-search
        *ngIf="isFacetSearchEnabled()"
        [categories]="searchCategories"
        [parentContainer]="facetSearchContainer"
      ></lib-facet-search>
      <br><br>
    </div>

    <!-- mock visualization section -->
    <div #visSection class="tw-flex tw-flex-col tw-w-3/4 tw-p-6 tw-overflow-auto">
      <h2>Visualization Section Placeholder</h2>
      <h2 class="tw-text-xl tw-font-bold tw-text-white tw-mb-4">Applied Search Filters</h2>

      <div class="tw-bg-white tw-rounded-lg tw-p-4 tw-shadow-lg">
        <div *ngIf="appliedSearchesDisplay().isEmpty; else hasFilters" class="tw-text-gray-500 tw-italic">
          No filters applied
        </div>

        <ng-template #hasFilters>
          <div class="tw-space-y-4">
            <!-- Summary -->
            <div class="tw-border-b tw-pb-3">
              <h3 class="tw-font-semibold tw-text-gray-800 tw-mb-2">Active Filters:</h3>
              <div class="tw-space-y-1">
                <div *ngFor="let summary of appliedSearchesDisplay().summary"
                     class="tw-bg-blue-100 tw-text-blue-800 tw-px-3 tw-py-1 tw-rounded-full tw-text-sm">
                  {{ summary }}
                </div>
              </div>
            </div>

            <!-- Raw Data Structure -->
            <div>
              <h3 class="tw-font-semibold tw-text-gray-800 tw-mb-2">Raw Data Structure:</h3>
              <pre class="tw-bg-gray-100 tw-p-3 tw-rounded tw-text-xs tw-overflow-auto tw-max-h-64">{{ appliedSearchesDisplay().appliedSearches | json }}</pre>
            </div>

            <!-- Individual Categories -->
            <div>
              <h3 class="tw-font-semibold tw-text-gray-800 tw-mb-2">Filter Details:</h3>
              <div class="tw-grid tw-grid-cols-1 tw-gap-3">
                <div *ngFor="let category of appliedSearchesDisplay().appliedSearches | keyvalue"
                     class="tw-border tw-rounded tw-p-3">
                  <div class="tw-font-medium tw-text-gray-700">{{ category.key | titlecase }}</div>
                  <div class="tw-flex tw-flex-wrap tw-gap-1 tw-mt-1">
                    <span *ngFor="let option of category.value"
                          class="tw-bg-green-100 tw-text-green-800 tw-px-2 tw-py-1 tw-rounded tw-text-xs">
                      {{ option }}
                    </span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </ng-template>
      </div>
    </div>
  </div>
</div>

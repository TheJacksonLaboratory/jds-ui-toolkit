<!-- Tailwind CSS classes -->
<div class="tw-flex-col">
  <div class="tw-flex tw-justify-center tw-my-5">
    <h3 class="tw-font-semibold">
      Async Tasks
    </h3>
  </div>
  <p-table
    [value]="tasks"
    showGridlines
    stripedRows>
    <ng-template #header>
      <tr>
        <th class="tw-font-semibold">Task ID</th>
        <th class="tw-font-semibold">Task Name</th>
        <th class="tw-font-semibold">Task Status</th>
      </tr>
    </ng-template>
    <ng-template #body let-task>
      <tr>
        <td>{{ task.id }}</td>
        <td>{{ task.name }}</td>
        <td>{{ task.status }}</td>
      </tr>
    </ng-template>
  </p-table>
</div>

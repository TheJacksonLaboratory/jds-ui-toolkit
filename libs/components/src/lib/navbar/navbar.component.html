<p-menubar [model]="items" class="tw-w-full">
  <ng-template #start>
    <a aria-label="Logo" class="p-menubar-logo tw-mr-2" [href]="logoLink">
      @if (isSvg()) {
        <img [src]="logo" alt="Logo" class="tw-w-[24px] tw-h-[32px]" />
      }
      <i class="pi pi-cog tw-text-2xl"></i>
    </a>
    <h1 class="tw-text-xl">{{title}}</h1>
  </ng-template>
  <ng-template #item let-item let-root="root">
    <div class="margin-auto">
      <a pRipple class="flex items-center p-menubar-item-link" [routerLink]="item.routerLink">
        <span>{{ item.label }}</span>
        @if (item.badge) {
          <p-badge [ngClass]="{ 'ml-auto': !root, 'ml-2': root }" [value]="item.badge" />
        }
        @if (item.shortcut) {
          <span class="ml-auto border border-surface rounded bg-emphasis text-muted-color text-xs p-1">{{ item.shortcut }}</span>
        }
        @if (item.items) {
          <i [ngClass]="['ml-auto pi', root ? 'pi-angle-down' : 'pi-angle-right']"></i>
        }
      </a>
    </div>
  </ng-template>
  <ng-template #end>
    <div class="tw-flex tw-items-center">
      @if (externalLink) {
        <a class="p-button-link tw-mr-4" [href]="externalLink" target="_blank">{{externalLinkLabel}}</a>
      }
      <p-avatar image="https://primefaces.org/cdn/primeng/images/demo/avatar/amyelsner.png" shape="circle" />
      @if (!authentication) {
        <div class="tw-ml-4">
          <lib-jds-auth></lib-jds-auth>
        </div>
      }
    </div>
  </ng-template>
</p-menubar>

<p-button
  *ngIf="(auth.isAuthenticated$ | async) === false"
  id="jds-login-btn"
  label="Login"
  severity="secondary"
  size="small"
  (click)="login()"
/>
<p-button
  *ngIf="auth.isAuthenticated$ | async"
  id="jds-logout-btn"
  label="Logout"
  severity="primary"
  size="small"
  (click)="logout()"
/>

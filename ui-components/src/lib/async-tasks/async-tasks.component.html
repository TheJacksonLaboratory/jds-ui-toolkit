<!-- Tailwind CSS classes -->
<div class="flex-col">
  <div class="flex-col">
    <div class="flex justify-center my-5">
      <h3 class="font-medium">
        Async Tasks UI Component
      </h3>
    </div>
  </div>
  <br>
  <br>
  <p-table
    [value]="tasks"
    showGridlines
    stripedRows>
    <ng-template #header>
      <tr>
        <th>Task ID</th>
        <th>Task Name</th>
        <th>Task Status</th>
      </tr>
    </ng-template>
    <ng-template #body let-task>
      <tr>
        <td>{{ task.id }}</td>
        <td>{{ task.name }}</td>
        <td>{{ task.status }}</td>
      </tr>
    </ng-template>
  </p-table>
</div>
